{% extends "base.html" %}

{% block title %}
    Главная страница
{% endblock %}


{% block content %}
<h1>Все роадмапы</h1>
<div class="album py-5 bg-body-tertiary"> 
    <div class="container"> 
        <div class="row row-cols-1 row-cols-sm-2 row-cols-md-3 g-4"> 
            
            {% for roadmap in roadmaps %}
            <div class="col"> 
                <div class="card shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-start mb-2">
                            <h5 class="card-title mb-0">{{ roadmap['title']}}</h5>
                                <button class="favorite-btn" data-id="{{ roadmap.id }}">
                                    <img class="icon" alt="Избранное" src="{% if roadmap['id'] in fav_ids %}
                                                {{ url_for('static', filename='images/favorite-on.svg') }}
                                           
                                            {% else %}
                                                {{ url_for('static', filename='images/favorite-off.svg') }}
                                       
                                            {% endif %}">
                                </button>                                       
                        </div>
                        <p class="card-text text-muted">
                            {{ roadmap['description']}} 
                        </p>
                    </div>
                    <div class="card-footer bg-transparent border-top-0">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-body-secondary">
                                <i class="bi bi-clock"></i> ~{{ roadmap['hours']}} hours
                            </small>
                            <a href="#" class="btn btn-sm btn-primary">
                                Открыть →
                            </a>
                        </div>
                    </div>
                </div> 
            </div>
            {% endfor %}
        </div> 
    </div>
</div>
<script>
const btns = document.querySelectorAll('.favorite-btn');

btns.forEach(btn => {
    btn.onclick = function() {
        const isAuth = "{{ current_user.is_authenticated }}" === "True";
        if (!isAuth) {
            const authModal = new bootstrap.Modal(document.getElementById('authModal'));
            authModal.show();
            return;
        }


        const id = this.dataset.id;
        const img = this.querySelector('img');
        
        fetch(`/toggle-favorite/${id}`, {method: 'POST'});
        
        if (img.src.includes('off')) {
            img.src = "{{ url_for('static', filename='images/favorite-on.svg') }}";
        } else {
            img.src = "{{ url_for('static', filename='images/favorite-off.svg') }}";
        }
    };
});
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
