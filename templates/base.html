<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <div class="container">
        <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom"> 
            <div class="col-md-3 mb-2 mb-md-0"> 
                <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none"> 
                    <img class="logo_img" src="{{ url_for('static', filename='images/logo.webp') }}" alt="Logo">
                </a> 
            </div>
                <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0"> 
                    <li><a href="{{ url_for('home') }}" class="nav-link px-2 link-secondary">Главная</a></li>
                    <li><a href="{{ url_for('about') }}" class="nav-link px-2">О нас</a></li> 
                </ul> 
                <div class="col-md-3 text-end"> 
                <button type="button" class="btn btn-outline-primary me-2">Войти</button> 
                <button type="button" class="btn btn-primary">Регистрация</button> 
            </div> 
        </header>
    {%block content%}{% endblock %}
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
    <div class="col-md-4 d-flex align-items-center">
        <span class="mb-3 mb-md-0 text-body-secondary">© 2026 Pathly</span>
    </div>
    <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
        <li class="ms-3"><a class="text-body-secondary" href="https://github.com/nikitaklyashev">
            <img class="icon_img" src="{{ url_for('static', filename='images/github_icon.png') }}" alt="GitHub"></a>
        </li>
    </ul>
</footer>
    </div>
</body>
</html>
