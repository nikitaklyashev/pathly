<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="{{url_for('static', filename='css/main.css')}}">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>
    <div class="container">
        <header class="d-flex flex-wrap align-items-center justify-content-center justify-content-md-between py-3 mb-4 border-bottom"> 
            <div class="col-md-3 mb-2 mb-md-0"> 
                <a href="/" class="d-inline-flex link-body-emphasis text-decoration-none"> 
                    <img class="logo" src="{{ url_for('static', filename='images/logo.webp') }}" alt="Logo">
                </a> 
            </div>
                <ul class="nav col-12 col-md-auto mb-2 justify-content-center mb-md-0"> 
                    <li><a href="{{ url_for('home') }}" class="nav-link px-2 {% if active_page == 'about' %}link-secondary{% endif %}">Главная</a></li>
                    <li><a href="{{ url_for('about') }}" class="nav-link px-2 {% if active_page == 'home' %}link-secondary{% endif %}">О нас</a></li> 
                </ul> 
                <div class="col-md-3 text-end"> 
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('profile') }}">
                    <img class="icon avatar" src="{{ url_for('static', filename='images/avatar.png') }}" alt="Аватарка">
                </a>
                {% else %}
                <a href="{{ url_for('login') }}" class="btn btn-outline-primary me-2">
                    Вход
                </a>
                <a href="{{ url_for('register') }}" class="btn btn-primary">
                    Регистрация
                </a>
                {% endif %}
            </div> 
        </header>
    {%block content%}{% endblock %}
    <footer class="d-flex flex-wrap justify-content-between align-items-center py-3 my-4 border-top">
    <div class="col-md-4 d-flex align-items-center">
        <span class="mb-3 mb-md-0 text-body-secondary">© 2026 Pathly</span>
    </div>
    <ul class="nav col-md-4 justify-content-end list-unstyled d-flex">
        <li class="ms-3"><a class="text-body-secondary" href="https://github.com/nikitaklyashev">
            <img class="icon" src="{{ url_for('static', filename='images/github_icon.png') }}" alt="GitHub"></a>
        </li>
    </ul>
</footer>
    </div>
    <div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-fullscreen-sm-down">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-4" id="authModalLabel">Вы не вошли в аккаунт</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Закрыть"></button>
                </div>
                <div class="modal-body d-flex flex-column gap-3">
                    <p class="text-muted text-center">Войдите или зарегистрируйтесь</p>
                    <a href="{{ url_for('login') }}" class="btn btn-outline-primary w-100 py-2">Вход</a>
                    <a href="{{ url_for('register') }}" class="btn btn-primary w-100 py-2">Регистрация</a>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary w-100" data-bs-dismiss="modal">Закрыть</button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
